services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prompts-backend
    ports:
      - "127.0.0.1:5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      # Persist SQLite database across restarts
      - backend-data:/app/prisma
      # Persist logs
      - backend-logs:/app/logs
      # Mount your project directories so the app can read/write source files
      # Add your project paths here (host_path:container_path)
      # Example: - C:/SNIX/sify/HrAssist:/projects/HrAssist
      # Example: - /home/user/myapp:/projects/myapp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000
    container_name: prompts-frontend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-data:
    driver: local
  backend-logs:
    driver: local
